apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: operational-assistant-netpol
  namespace: operational-assistant
spec:
  podSelector:
    matchLabels:
      app: operational-assistant
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic only from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP

  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS egress (e.g. AWS APIs)
    - ports:
        - port: 443
          protocol: TCP
