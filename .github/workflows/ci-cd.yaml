name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: operational-assistant
  EKS_CLUSTER_NAME: operational-assistant-eks
  K8S_NAMESPACE: operational-assistant

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ── Build & Push ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Image URI: ${IMAGE_URI}"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_COMMIT=${{ github.sha }} \
            --tag ${{ steps.meta.outputs.image_uri }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image_uri }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ── Deploy to EKS ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://operational-assistant.internal.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply K8s namespace and RBAC
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/rbac.yaml

      - name: Apply ConfigMap
        run: kubectl apply -f deploy/k8s/configmap.yaml

      - name: Inject and apply Secret
        env:
          API_KEY: ${{ secrets.APP_API_KEY }}
          AWS_REGION_SECRET: ${{ env.AWS_REGION }}
        run: |
          sed \
            -e "s/__REPLACED_BY_PIPELINE__/${API_KEY}/1" \
            -e "s/__REPLACED_BY_PIPELINE__/${AWS_REGION_SECRET}/2" \
            deploy/k8s/secret.yaml | kubectl apply -f -

      - name: Update image in deployment
        run: |
          kubectl set image deployment/operational-assistant \
            operational-assistant=${{ needs.build-and-push.outputs.image_uri }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl annotate deployment/operational-assistant \
            kubernetes.io/change-cause="commit=${{ github.sha }} pipeline=${{ github.run_id }}" \
            -n ${{ env.K8S_NAMESPACE }} --overwrite

      - name: Apply remaining manifests
        run: |
          kubectl apply -f deploy/k8s/service.yaml
          kubectl apply -f deploy/k8s/ingress.yaml
          kubectl apply -f deploy/k8s/networkpolicy.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/operational-assistant \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Smoke test
        run: |
          INGRESS_HOST=$(kubectl get ingress operational-assistant-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Ingress host: ${INGRESS_HOST}"
          curl -f "https://${INGRESS_HOST}/health" || echo "Smoke test skipped (internal ingress)"